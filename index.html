<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity | 3D Interaction</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #video-container { position: absolute; width: 100%; height: 100%; z-index: -1; transform: scaleX(-1); }
        video { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        
        #ui-overlay {
            position: absolute; top: 30px; left: 30px; color: #00ffcc;
            background: rgba(0,0,0,0.7); padding: 20px; border-left: 4px solid #00ffcc;
            pointer-events: none; z-index: 10;
        }

        /* START BUTTON - Critical for Chrome */
        #start-screen {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; color: #00ffcc; text-align: center;
        }
        button {
            background: transparent; border: 2px solid #00ffcc; color: #00ffcc;
            padding: 15px 40px; font-size: 1.2rem; cursor: pointer; text-transform: uppercase;
            margin-top: 20px; transition: 0.3s;
        }
        button:hover { background: #00ffcc; color: #000; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>ANTIGRAVITY INTERFACE</h1>
        <p>Ready to initialize hand-tracking sensors?</p>
        <button onclick="startExperience()">Initialize Protocol</button>
    </div>

    <div id="ui-overlay">
        <div style="font-weight: bold; letter-spacing: 2px;">SYSTEM STATUS</div>
        <div id="status">AWAITING INITIALIZATION...</div>
    </div>

    <div id="video-container">
        <video id="input_video" playsinline></video>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const videoElement = document.getElementById('input_video');
        const statusEl = document.getElementById('status');
        const startScreen = document.getElementById('start-screen');

        // 1. THREE.JS SETUP
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        camera.position.z = 2;

        const core = new THREE.Mesh(
            new THREE.IcosahedronGeometry(0.15, 1),
            new THREE.MeshStandardMaterial({ color: 0x00ffcc, wireframe: true })
        );
        scene.add(core);
        scene.add(new THREE.AmbientLight(0xffffff, 1));

        // 2. MEDIAPIPE LOGIC
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                statusEl.innerText = "SENSORS: TRACKING ACTIVE";
                const h1 = results.multiHandLandmarks[0][9]; // Palm center
                core.position.x = (h1.x - 0.5) * -3;
                core.position.y = (h1.y - 0.5) * -2;
                core.visible = true;
            } else {
                statusEl.innerText = "SENSORS: SEARCHING...";
                core.visible = false;
            }
        });

        // 3. START FUNCTION
        async function startExperience() {
            startScreen.style.display = 'none';
            statusEl.innerText = "LOADING AI MODELS...";
            
            try {
                const cameraHelper = new Camera(videoElement, {
                    onFrame: async () => { await hands.send({ image: videoElement }); },
                    width: 1280, height: 720
                });
                await cameraHelper.start();
                statusEl.innerText = "CAMERA ACTIVE. CALIBRATING...";
            } catch (e) {
                statusEl.innerText = "ERROR: CAMERA BLOCKED";
                console.error(e);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            core.rotation.y += 0.02;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
